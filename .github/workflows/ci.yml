name: CI

on:
    push:
        branches: [main, staging]
    pull_request:
        branches: [main, staging]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npm run lint
            - run: npm run format:check

    type-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prisma generate
            - run: npx tsc --noEmit

    unit-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prisma generate
            - run: npm run test:unit -- --coverage
            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: unit-coverage
                  path: coverage/
                  retention-days: 14

    build:
        runs-on: ubuntu-latest
        needs: [lint, type-check, unit-tests]
        env:
            DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
            DIRECT_URL: ${{ secrets.TEST_DIRECT_URL }}
            NEXTAUTH_SECRET: ci-build-secret
            NEXTAUTH_URL: http://localhost:3003
            NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prisma generate
            - run: npm run build

    e2e-staging:
        # Runs after all checks pass, but only on pushes to staging (not PRs, not main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
        runs-on: ubuntu-latest
        needs: [lint, type-check, unit-tests, build]
        env:
            DATABASE_URL: ${{ secrets.STAGING_TEST_DATABASE_URL }}
            DIRECT_URL: ${{ secrets.STAGING_TEST_DIRECT_URL }}
            NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL: ${{ secrets.STAGING_URL }}
            NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            SKIP_SMS: 'true'
            SKIP_EMAIL: 'true'
            TEST_CLEANUP_SECRET: ${{ secrets.TEST_CLEANUP_SECRET }}
            # Run E2E against the deployed staging URL, not localhost
            PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prisma generate
            - run: npx playwright install --with-deps chromium
            # Wait for Vercel staging deployment to be ready (up to 5 min)
            - name: Wait for staging deployment
              run: |
                  for i in $(seq 1 30); do
                    if curl -sf "${{ secrets.STAGING_URL }}" > /dev/null; then
                      echo "Staging is up"; break
                    fi
                    echo "Waiting... ($i/30)"; sleep 10
                  done
            - run: npx playwright test --project=chromium
            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report-staging
                  path: playwright-report/
                  retention-days: 14

    smoke-production:
        # Lightweight smoke test after merging to main (production deploy)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        needs: [lint, type-check, unit-tests, build]
        env:
            PLAYWRIGHT_BASE_URL: ${{ secrets.PRODUCTION_URL }}
            TEST_CLEANUP_SECRET: ${{ secrets.TEST_CLEANUP_SECRET }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx playwright install --with-deps chromium
            - run: npx playwright test tests/e2e/smoke.spec.ts --project=chromium
            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report-smoke
                  path: playwright-report/
                  retention-days: 7
