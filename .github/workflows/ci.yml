name: CI

on:
    push:
        branches: [main, staging]
    pull_request:
        branches: [main, staging]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npm run lint
            - run: npm run format:check

    type-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prisma generate
            - run: npx tsc --noEmit

    unit-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prisma generate
            - run: npm run test:unit -- --coverage
            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: unit-coverage
                  path: coverage/
                  retention-days: 14

    build:
        runs-on: ubuntu-latest
        needs: [lint, type-check, unit-tests]
        env:
            DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
            DIRECT_URL: ${{ secrets.TEST_DIRECT_URL }}
            NEXTAUTH_SECRET: ci-build-secret
            NEXTAUTH_URL: http://localhost:3003
            NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prisma generate
            - run: npm run build

    # Full E2E suite — only on PRs targeting staging; spins up a local production build
    e2e:
        if: github.event_name == 'pull_request' && github.base_ref == 'staging'
        runs-on: ubuntu-latest
        needs: [lint, type-check, unit-tests, build]
        env:
            DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
            DIRECT_URL: ${{ secrets.TEST_DIRECT_URL }}
            NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL: http://localhost:3003
            NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            SKIP_SMS: 'true'
            SKIP_EMAIL: 'true'
            TEST_CLEANUP_SECRET: ${{ secrets.TEST_CLEANUP_SECRET }}
            # No PLAYWRIGHT_BASE_URL — defaults to localhost:3003; playwright starts the server locally
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prisma generate
            - run: npm run build
            - run: npx playwright install --with-deps chromium
            - run: npx playwright test --project=chromium
            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report-e2e
                  path: playwright-report/
                  retention-days: 14

    # Smoke test against the deployed staging URL — only on PRs targeting main
    smoke-staging:
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        runs-on: ubuntu-latest
        needs: [lint, type-check, unit-tests, build]
        env:
            PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL }}
            TEST_CLEANUP_SECRET: ${{ secrets.TEST_CLEANUP_SECRET }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx playwright install --with-deps chromium
            - run: npx playwright test tests/e2e/smoke.spec.ts --project=chromium
            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report-smoke-staging
                  path: playwright-report/
                  retention-days: 7

    # Smoke test against production — runs after merging to main
    smoke-production:
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        needs: [lint, type-check, unit-tests, build]
        env:
            PLAYWRIGHT_BASE_URL: ${{ secrets.PRODUCTION_URL }}
            TEST_CLEANUP_SECRET: ${{ secrets.TEST_CLEANUP_SECRET }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx playwright install --with-deps chromium
            - run: npx playwright test tests/e2e/smoke.spec.ts --project=chromium
            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report-smoke-production
                  path: playwright-report/
                  retention-days: 7
