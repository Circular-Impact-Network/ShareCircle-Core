name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npm run lint
            - run: npm run format:check

    type-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prisma generate
            - run: npx tsc --noEmit

    unit-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prisma generate
            - run: npm run test:unit -- --coverage
            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: unit-coverage
                  path: coverage/
                  retention-days: 14

    # E2E needs a real Postgres URL and NextAuth/Supabase secrets; add repo secrets or this job will fail at signup (empty DATABASE_URL).
    e2e-tests:
        runs-on: ubuntu-latest
        needs: [lint, type-check, unit-tests]
        env:
            DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
            DIRECT_URL: ${{ secrets.TEST_DIRECT_URL }}
            NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL: http://localhost:3003
            NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            E2E_AUTO_VERIFY: 'true'
            SKIP_SMS: 'true'
            SKIP_EMAIL: 'true'
            TEST_CLEANUP_SECRET: ${{ secrets.TEST_CLEANUP_SECRET }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prisma generate
            - run: npx playwright install --with-deps chromium
            - run: npm run build
            - run: npx playwright test
            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 14

    build:
        runs-on: ubuntu-latest
        needs: [lint, type-check, unit-tests]
        env:
            DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
            DIRECT_URL: ${{ secrets.TEST_DIRECT_URL }}
            NEXTAUTH_SECRET: ci-build-secret
            NEXTAUTH_URL: http://localhost:3003
            NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
            - run: npm ci
            - run: npx prisma generate
            - run: npm run build
